<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rent Sathi Sign-In</title>

    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/4.0.0/uicons-bold-rounded/css/uicons-bold-rounded.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap");

      :root {
        --bg: #faf8f5;
        --surface: #ffffff;
        --ink: #1c1917;
        --ink-muted: #6b6560;
        --ink-faint: #a9a39d;
        --accent: #d4622a;
        --accent-lt: #faeee6;
        --accent-dk: #b04e1e;
        --border: #e8e4de;
        --border-strong: #ccc8c1;
        --green: #167157;
        --green-lt: #d1fae5;
        --blue: #1d4ed8;
        --blue-lt: #dbeafe;
        --amber: #b45309;
        --amber-lt: #fef3c7;
        --red: #b91c1c;
        --red-lt: #fee2e2;
        --radius-sm: 8px;
        --radius-md: 14px;
        --radius-lg: 20px;
        --radius-xl: 28px;
        --shadow-sm: 0 1px 4px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.09);
        --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.13);
        --font-head: "DM Serif Display", serif;
        --font-body: "DM Sans", sans-serif;
        --nav-h: 60px;
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        scroll-behavior: smooth;
      }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font-body);
        -webkit-font-smoothing: antialiased;
      }
      a {
        text-decoration: none;
        color: inherit;
      }
      img {
        display: block;
        max-width: 100%;
      }
      button {
        font-family: var(--font-body);
        cursor: pointer;
      }
      .navbar {
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        border-bottom: 1px solid var(--border);
        align-items: center;
        justify-content: space-between;
        padding: 0 2rem;
        height: var(--nav-h);
        background: var(--surface);
      }
      .logo {
        font-family: var(--font-head);
        font-size: 1.35rem;
        color: var(--ink);
        letter-spacing: -0.02rem;
      }
      .logo span {
        color: var(--accent);
      }
      .nav-links {
        display: flex;
        gap: 0.25rem;
      }
      .nav-links a {
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--ink-muted);
        padding: 0.4rem 0.85rem;
        border-radius: var(--radius-sm);
        transition:
          background 0.15s,
          color 0.15s;
      }
      .nav-links a:hover,
      .nav-links a:active {
        color: var(--ink);
        background: var(--bg);
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-links">
        <a href="index.html">Browse</a>
        <a href="listings.html">Listings</a>
      </div>
      <div class="logo">Rent<span>Sathi</span></div>
      <div></div>
    </nav>
    <div class="auth-page">
      <div class="auth-left">
        <div class="auth-left-content">
          <p class="auth-quote">
            Your home away from home, <br /><em>just a search away.</em>
          </p>
          <p class="auth-tagline">
            Join thousands of people renting smarter across Nepal
          </p>
          <div class="auth-trust-row">
            <div class="trust-pill">
              <i class="fi fi-br-shield-check"></i> Verified owners
            </div>
            <div class="trust-pill">
              <i class="fi fi-br-lock"></i> Secure booking
            </div>
            <div class="trust-pill">
              <i class="fi fi-br-star"></i> Trusted reviews
            </div>
          </div>
        </div>
      </div>

      <div class="auth-right">
        <div class="auth-logo">Rent<span>Sathi</span></div>

        <div class="auth-tabs">
            <div class="auth-tab active" id="tab-login">Sign-In</div>
            <div class="auth-tab" id="tab-register">Create Account</div>
        </div>
      </div>
    </div>
  </body>
</html>
