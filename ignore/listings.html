<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RentSathi — Browse Listings</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/4.0.0/uicons-bold-rounded/css/uicons-bold-rounded.css"
    />
    <link rel="stylesheet" href="shared.css" />
    <style>
      .listings-layout {
        display: grid;
        grid-template-columns: 272px 1fr;
        min-height: calc(100vh - var(--nav-h));
      }

      /* ── Filters sidebar ── */
      .filters-panel {
        background: var(--surface);
        border-right: 1px solid var(--border);
        padding: 1.5rem;
        position: sticky;
        top: var(--nav-h);
        height: calc(100vh - var(--nav-h));
        overflow-y: auto;
      }
      .filters-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1.5rem;
      }
      .filters-header h3 {
        font-size: 0.95rem;
        font-weight: 600;
      }
      .clear-btn {
        font-size: 0.8rem;
        color: var(--accent);
        cursor: pointer;
        background: none;
        border: none;
        font-family: var(--font-body);
      }
      .filter-section {
        margin-bottom: 1.5rem;
        padding-bottom: 1.5rem;
        border-bottom: 1px solid var(--border);
      }
      .filter-section:last-child {
        border-bottom: none;
      }
      .filter-section h4 {
        font-size: 0.82rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--ink-muted);
        margin-bottom: 0.85rem;
      }
      .filter-options {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }
      .filter-option {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        padding: 0.45rem 0.6rem;
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-size: 0.88rem;
        transition: background 0.12s;
      }
      .filter-option:hover {
        background: var(--bg);
      }
      .filter-option input[type="checkbox"],
      .filter-option input[type="radio"] {
        accent-color: var(--accent);
        width: 15px;
        height: 15px;
        cursor: pointer;
      }
      .filter-option .count {
        margin-left: auto;
        font-size: 0.75rem;
        color: var(--ink-faint);
      }
      .filter-option.selected {
        background: var(--accent-lt);
        color: var(--accent);
      }

      /* Price range */
      .price-inputs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.6rem;
        margin-top: 0.5rem;
      }
      .price-input-wrap {
        position: relative;
      }
      .price-input-wrap .currency {
        position: absolute;
        left: 0.65rem;
        top: 50%;
        transform: translateY(-50%);
        font-size: 0.8rem;
        color: var(--ink-muted);
        font-weight: 500;
      }
      .price-input-wrap input {
        width: 100%;
        padding: 0.5rem 0.5rem 0.5rem 2rem;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        font-family: var(--font-body);
        font-size: 0.84rem;
        outline: none;
        color: var(--ink);
        transition: border-color 0.15s;
      }
      .price-input-wrap input:focus {
        border-color: var(--accent);
      }

      /* City chips */
      .city-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .city-chip {
        padding: 0.35rem 0.85rem;
        border-radius: 99px;
        font-size: 0.82rem;
        font-weight: 500;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--ink-muted);
        cursor: pointer;
        transition: all 0.15s;
      }
      .city-chip:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .city-chip.active {
        background: var(--accent-lt);
        color: var(--accent);
        border-color: var(--accent);
      }

      /* ── Results area ── */
      .results-area {
        padding: 1.25rem 1.5rem;
      }
      .results-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1.25rem;
        flex-wrap: wrap;
        gap: 0.75rem;
      }
      .results-count {
        font-size: 0.88rem;
        color: var(--ink-muted);
      }
      .results-count strong {
        color: var(--ink);
        font-weight: 600;
      }
      .sort-bar {
        display: flex;
        align-items: center;
        gap: 0.65rem;
      }
      .sort-label {
        font-size: 0.84rem;
        color: var(--ink-muted);
      }

      /* Active filters strip */
      .active-filters {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 1rem;
        flex-wrap: wrap;
      }
      .active-filter-chip {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.3rem 0.7rem;
        border-radius: 99px;
        background: var(--accent-lt);
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 500;
        border: 1px solid rgba(212, 98, 42, 0.2);
      }
      .active-filter-chip button {
        background: none;
        border: none;
        color: var(--accent);
        cursor: pointer;
        font-size: 0.7rem;
        padding: 0;
        line-height: 1;
      }

      /* Grid */
      .listings-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(272px, 1fr));
        gap: 1.15rem;
      }

      /* Card (same as home, trimmed) */
      .l-card {
        background: var(--surface);
        border-radius: var(--radius-md);
        overflow: hidden;
        border: 1px solid var(--border);
        box-shadow: var(--shadow-sm);
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        animation: fadeUp 0.4s ease both;
      }
      .l-card:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-md);
      }
      .l-card:nth-child(1) {
        animation-delay: 0.04s;
      }
      .l-card:nth-child(2) {
        animation-delay: 0.08s;
      }
      .l-card:nth-child(3) {
        animation-delay: 0.12s;
      }
      .l-card:nth-child(4) {
        animation-delay: 0.16s;
      }
      .l-card:nth-child(5) {
        animation-delay: 0.2s;
      }
      .l-card:nth-child(6) {
        animation-delay: 0.24s;
      }
      .l-card:nth-child(7) {
        animation-delay: 0.28s;
      }
      .l-card:nth-child(8) {
        animation-delay: 0.32s;
      }
      .l-img-wrap {
        position: relative;
        height: 175px;
        overflow: hidden;
      }
      .l-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.3s;
      }
      .l-card:hover .l-img {
        transform: scale(1.04);
      }
      .l-badge {
        position: absolute;
        top: 9px;
        left: 9px;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        padding: 3px 9px;
        border-radius: 99px;
        color: #fff;
      }
      .l-badge.room {
        background: rgba(212, 98, 42, 0.9);
      }
      .l-badge.vehicle {
        background: rgba(29, 78, 216, 0.9);
      }
      .l-badge.service {
        background: rgba(22, 113, 87, 0.9);
      }
      .l-save {
        position: absolute;
        top: 9px;
        right: 9px;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.9);
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: var(--ink-muted);
        font-size: 0.8rem;
        transition: color 0.15s;
      }
      .l-save:hover,
      .l-save.saved {
        color: var(--accent);
      }
      .l-price {
        position: absolute;
        bottom: 9px;
        right: 9px;
        background: #fff;
        font-size: 0.78rem;
        font-weight: 700;
        padding: 3px 9px;
        border-radius: 99px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.14);
      }
      .l-price span {
        font-weight: 400;
        color: var(--ink-muted);
        font-size: 0.7rem;
      }
      .l-body {
        padding: 11px 13px 13px;
      }
      .l-owner {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 5px;
      }
      .l-avatar {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--accent-lt);
        color: var(--accent);
        font-size: 0.58rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .l-owner-name {
        font-size: 0.76rem;
        color: var(--ink-muted);
        font-weight: 500;
      }
      .l-title {
        font-size: 0.92rem;
        font-weight: 600;
        margin-bottom: 5px;
        line-height: 1.3;
      }
      .l-loc {
        font-size: 0.78rem;
        color: var(--ink-muted);
        display: flex;
        align-items: center;
        gap: 3px;
        margin-bottom: 10px;
      }
      .l-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-top: 1px solid var(--border);
        padding-top: 9px;
      }
      .l-rating {
        display: flex;
        align-items: center;
        gap: 3px;
        font-size: 0.76rem;
        font-weight: 600;
      }
      .l-rating i {
        color: #f59e0b;
        font-size: 0.68rem;
      }
      .l-rating .rc {
        font-weight: 400;
        color: var(--ink-muted);
      }
      .l-btn {
        font-size: 0.76rem;
        font-weight: 600;
        padding: 0.35rem 0.85rem;
        border-radius: var(--radius-sm);
        background: var(--ink);
        color: #fff;
        border: none;
        cursor: pointer;
        transition: background 0.15s;
      }
      .l-btn:hover {
        background: var(--accent);
      }

      /* Map toggle */
      .view-toggle {
        display: flex;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        overflow: hidden;
      }
      .view-btn {
        padding: 0.4rem 0.75rem;
        font-size: 0.82rem;
        font-weight: 500;
        color: var(--ink-muted);
        background: var(--surface);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.35rem;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .view-btn.active {
        background: var(--accent-lt);
        color: var(--accent);
      }
      .view-btn:not(:last-child) {
        border-right: 1px solid var(--border);
      }

      /* Pagination */
      .pagination {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        margin-top: 2rem;
        justify-content: center;
        padding-bottom: 2rem;
      }
      .page-btn {
        width: 36px;
        height: 36px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--ink-muted);
        font-size: 0.84rem;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
        font-family: var(--font-body);
      }
      .page-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .page-btn.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .page-btn.arrow {
        font-size: 0.7rem;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="listings.html" class="active">Browse</a>
        <a href="listings.html?cat=vehicle">Vehicles</a>
        <a href="listings.html?cat=service">Services</a>
      </div>
      <div
        class="logo"
        onclick="location.href = 'index.html'"
        style="cursor: pointer"
      >
        Rent<span>Sathi</span>
      </div>
      <div class="nav-auth">
        <button
          class="btn btn-ghost btn-sm"
          onclick="location.href = 'login.html'"
        >
          Sign In
        </button>
        <button
          class="btn btn-solid btn-sm"
          onclick="location.href = 'register.html'"
        >
          Register
        </button>
      </div>
    </nav>

    <div class="listings-layout">
      <!-- Filters -->
      <aside class="filters-panel">
        <div class="filters-header">
          <h3>
            <i class="fi fi-br-filter" style="color: var(--accent)"></i> Filters
          </h3>
          <button class="clear-btn" onclick="clearFilters()">Clear all</button>
        </div>

        <div class="filter-section">
          <h4>Category</h4>
          <div class="filter-options">
            <label class="filter-option"
              ><input type="radio" name="cat" checked /> All categories
              <span class="count">1,205</span></label
            >
            <label class="filter-option"
              ><input type="radio" name="cat" />
              <i class="fi fi-br-home" style="color: var(--accent)"></i> Rooms
              &amp; Flats <span class="count">820</span></label
            >
            <label class="filter-option"
              ><input type="radio" name="cat" />
              <i class="fi fi-br-car-side" style="color: var(--blue)"></i>
              Vehicles <span class="count">210</span></label
            >
            <label class="filter-option"
              ><input type="radio" name="cat" />
              <i class="fi fi-br-briefcase" style="color: var(--green)"></i>
              Services <span class="count">175</span></label
            >
          </div>
        </div>

        <div class="filter-section">
          <h4>City</h4>
          <div class="city-chips">
            <div class="city-chip active" onclick="toggleChip(this)">
              Kathmandu
            </div>
            <div class="city-chip" onclick="toggleChip(this)">Pokhara</div>
            <div class="city-chip" onclick="toggleChip(this)">Lalitpur</div>
            <div class="city-chip" onclick="toggleChip(this)">Bhaktapur</div>
            <div class="city-chip" onclick="toggleChip(this)">Chitwan</div>
            <div class="city-chip" onclick="toggleChip(this)">Butwal</div>
            <div class="city-chip" onclick="toggleChip(this)">Biratnagar</div>
          </div>
        </div>

        <div class="filter-section">
          <h4>Price range (NPR)</h4>
          <div class="price-inputs">
            <div class="price-input-wrap">
              <span class="currency">Rs</span
              ><input type="number" placeholder="Min" value="5000" />
            </div>
            <div class="price-input-wrap">
              <span class="currency">Rs</span
              ><input type="number" placeholder="Max" value="50000" />
            </div>
          </div>
        </div>

        <div class="filter-section">
          <h4>Amenities</h4>
          <div class="filter-options">
            <label class="filter-option"
              ><input type="checkbox" checked /> WiFi</label
            >
            <label class="filter-option"
              ><input type="checkbox" /> Parking</label
            >
            <label class="filter-option"
              ><input type="checkbox" checked /> Hot water</label
            >
            <label class="filter-option"><input type="checkbox" /> AC</label>
            <label class="filter-option"
              ><input type="checkbox" /> Generator</label
            >
            <label class="filter-option"
              ><input type="checkbox" /> Kitchen</label
            >
            <label class="filter-option"
              ><input type="checkbox" /> Security</label
            >
          </div>
        </div>

        <div class="filter-section">
          <h4>Owner</h4>
          <div class="filter-options">
            <label class="filter-option"
              ><input type="checkbox" checked /> Verified owners only</label
            >
            <label class="filter-option"
              ><input type="checkbox" /> Trust score 80+</label
            >
          </div>
        </div>

        <div class="filter-section">
          <h4>Rating</h4>
          <div class="filter-options">
            <label class="filter-option"
              ><input type="radio" name="rating" checked /> Any rating</label
            >
            <label class="filter-option"
              ><input type="radio" name="rating" /> 4+ stars</label
            >
            <label class="filter-option"
              ><input type="radio" name="rating" /> 4.5+ stars</label
            >
          </div>
        </div>

        <button
          class="btn btn-solid"
          style="width: 100%; justify-content: center; margin-top: 0.5rem"
          onclick="applyFilters()"
        >
          <i class="fi fi-br-search"></i> Apply filters
        </button>
      </aside>

      <!-- Results -->
      <main class="results-area">
        <!-- Top bar -->
        <div class="results-topbar">
          <div>
            <div
              style="
                font-family: var(--font-head);
                font-size: 1.4rem;
                margin-bottom: 0.2rem;
              "
            >
              Listings in Kathmandu
            </div>
            <div class="results-count"><strong>284</strong> results found</div>
          </div>
          <div class="sort-bar">
            <span class="sort-label">Sort by:</span>
            <select
              class="form-select"
              style="width: auto; padding: 0.4rem 0.75rem; font-size: 0.84rem"
            >
              <option>Most recent</option>
              <option>Price: low to high</option>
              <option>Price: high to low</option>
              <option>Highest rated</option>
              <option>Most bookings</option>
            </select>
            <div class="view-toggle">
              <button class="view-btn active">
                <i class="fi fi-br-apps"></i> Grid
              </button>
              <button class="view-btn">
                <i class="fi fi-br-list"></i> List
              </button>
            </div>
          </div>
        </div>

        <!-- Active filter chips -->
        <div class="active-filters">
          <span
            style="
              font-size: 0.78rem;
              color: var(--ink-muted);
              font-weight: 500;
            "
            >Active:</span
          >
          <div class="active-filter-chip">
            Kathmandu
            <button onclick="this.closest('.active-filter-chip').remove()">
              ✕
            </button>
          </div>
          <div class="active-filter-chip">
            WiFi
            <button onclick="this.closest('.active-filter-chip').remove()">
              ✕
            </button>
          </div>
          <div class="active-filter-chip">
            Hot water
            <button onclick="this.closest('.active-filter-chip').remove()">
              ✕
            </button>
          </div>
          <div class="active-filter-chip">
            Rs 5k–50k
            <button onclick="this.closest('.active-filter-chip').remove()">
              ✕
            </button>
          </div>
        </div>

        <!-- Grid -->
        <div class="listings-grid" id="listingsContainer"></div>
        <!-- Pagination -->
        <div class="pagination">
          <button class="page-btn arrow">
            <i class="fi fi-br-angle-left"></i>
          </button>
          <button class="page-btn active">1</button>
          <button
            class="page-btn"
            onclick="
              this.closest('.pagination')
                .querySelectorAll('.page-btn')
                .forEach((b) => b.classList.remove('active'));
              this.classList.add('active');
            "
          >
            2
          </button>
          <button
            class="page-btn"
            onclick="
              this.closest('.pagination')
                .querySelectorAll('.page-btn')
                .forEach((b) => b.classList.remove('active'));
              this.classList.add('active');
            "
          >
            3
          </button>
          <button
            class="page-btn"
            onclick="
              this.closest('.pagination')
                .querySelectorAll('.page-btn')
                .forEach((b) => b.classList.remove('active'));
              this.classList.add('active');
            "
          >
            4
          </button>
          <span style="color: var(--ink-faint); font-size: 0.84rem">…</span>
          <button
            class="page-btn"
            onclick="
              this.closest('.pagination')
                .querySelectorAll('.page-btn')
                .forEach((b) => b.classList.remove('active'));
              this.classList.add('active');
            "
          >
            36
          </button>
          <button class="page-btn arrow">
            <i class="fi fi-br-angle-right"></i>
          </button>
        </div>
      </main>
    </div>

    <script>
      // console.log("Script working")
      function toggleChip(el) {
        el.classList.toggle("active");
      }
      function clearFilters() {
        document
          .querySelectorAll(".city-chip")
          .forEach((c) => c.classList.remove("active"));
        document
          .querySelectorAll(".active-filter-chip")
          .forEach((c) => c.remove());
      }
      function applyFilters() {
        document.querySelector(".results-count strong").textContent =
          Math.floor(Math.random() * 200 + 80);
      }
      document.querySelectorAll(".view-btn").forEach((btn) =>
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".view-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
        }),
      );

      const API_URL = "http://localhost:5000/api/listings";
      async function fetchListings(){
        try{
          const res = await fetch(API_URL);
          const data = await res.json();

          if(data.success){
            // console.log("API RESPONSE: ",data)
          displayListings(data.data);
        }
      }
      catch(err){
        console.log("error fetching data: ",err)
      }
    }
      function displayListings(listings){
        const container = document.getElementById("listingsContainer");

        container.innerHTML = "";

        listings.forEach(item=>{
          const card = document.createElement("div");
          card.className = "l-card";
          card.innerHTML = `
          <div class="l-img-wrap">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSk12vaigCAxgk64qknZHYBQvP_Z_CEQlKGx45Zk9SCcy-ZUoXb6nAuGe7eVJUkJCVknC9gqO_bLBXVv8CtHI-CUUbZKOmI8uPrDKBEOGCR&s=10" || 'https://via.placeholder.com/300'}" class="l-img" />
        <span class="l-badge ${item.category}">${item.category}</span>
        <div class="l-price">Rs ${item.price}</div>
      </div>

      <div class="l-body">
        <div class="l-owner">
          <div class="l-avatar">${item.owner?.name?.charAt(0) || "U"}</div>
          <span class="l-owner-name">${item.owner?.name || "Unknown"}</span>
        </div>

        <h3 class="l-title">${item.title}</h3>
        <p class="l-loc">${item.location?.city||""},${item.location?.area||""}</p>

          `;
          container.appendChild(card);
        })
          document.querySelector(".results-count strong").textContent = listings.length;
        } 
        document.addEventListener("DOMContentLoaded",()=>{
